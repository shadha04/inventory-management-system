<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Edit Product</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 70px;
    }

    .navbar {
      background-color: #0d47a1 !important;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 900px;
      margin: auto;
      color: #fff;
    }

    .glass-card h3 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    }

    .form-control {
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .form-control::placeholder {
      color: #e0e0e0;
    }

    textarea.form-control {
      resize: none;
    }

    .btn-primary {
      background-color: #1976d2;
      border: none;
      border-radius: 8px;
    }

    .btn-primary:hover {
      background-color: #1565c0;
    }

    label {
      font-weight: 500;
    }

    small {
      display: block;
      margin-top: 5px;
      color: #fff;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Passwordt</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="btn btn-outline-light" href="{% url 'cs' %}">Home</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="/">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 70px);">
  <div class="glass-card">
    <h3>Change Password</h3>
    <form method="POST" enctype="multipart/form-data" autocomplete="off">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input type="text" name="pass" class="form-control" required placeholder='Enter New Password'>
      </div>

    

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="text" name="conpass" class="form-control" placeholder="Confirm Password">
      </div>

    
      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg">Update Password</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
