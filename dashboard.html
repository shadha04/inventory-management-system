<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background: linear-gradient(to right, #dbeafe, #e0f2fe);
    color: #1f2937;
    padding-top: 70px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .navbar {
    background-color: #60a5fa !important;
  }

  /* Common card style */
  .card {
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    color: #1f2937;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-bottom: 20px;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  }

  .card h3 {
    font-size: 2rem;
    font-weight: 600;
  }

  .card p {
    font-size: 1rem;
  }

  /* 4 different colors */
  .card-blue {
    background: linear-gradient(to bottom right, #bfdbfe, #93c5fd);
  }

  .card-red {
    background: linear-gradient(to bottom right, #fecaca, #f87171);
  }

  .card-green {
    background: linear-gradient(to bottom right, #bbf7d0, #4ade80);
  }

  .card-yellow {
    background: linear-gradient(to bottom right, #fef9c3, #fde68a);
  }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Dashboard</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="btn btn-outline-light" href="/ad/">Home</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'addpr' %}">Add Products</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'report' %}">Report</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light active" href="{% url 'dashboard' %}">Dashboard</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_order' %}">Orders</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_customer' %}">Customer</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="/">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center mb-4">Inventory Overview</h2>
  <div class="row g-4">
    <div class="col-md-3">
      <div class="card text-center p-3">
        <h3>{{ total_product }}</h3>
        <p>Total Products</p>
        <a href="{% url 'ad' %}" class="btn btn-delete text-dark btn-sm">View</a>

      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center p-3">
        <h3>{{ total_category }}</h3>
        <p>Total Categories</p>
        <a href="{% url 'view_cat' %}" class="btn btn-edit text-dark btn-sm">View</a>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center p-3 bg-danger">
        <h3>{{ low_stock }}</h3>
        <p>Low Stock</p>
        <a href="{% url 'low_stock_products' %}" class="btn btn-edit text-dark btn-sm">View</a>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card text-center p-3 bg-warning">
        <h3>{{ expired }}</h3>
        <p>Expired Products</p>
        <a href="{% url 'expired_products' %}" class="btn btn-edit text-dark btn-sm">View</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
