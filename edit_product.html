<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Edit Product</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
  body {
    background: linear-gradient(to right, #dbeafe, #e0f2fe);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 70px;
    color: #1f2937;
  }

  .navbar {
    background-color: #60a5fa !important;
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(15px);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    width: 95%;
    max-width: 900px;
    margin: auto;
    color: #1f2937;
  }

  .glass-card h3 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 600;
    color: #1e3a8a;
  }

  .form-control {
    border-radius: 8px;
    background: #f8fafc;
    color: #1f2937;
    border: 1px solid #cbd5f5;
  }

  .form-control::placeholder {
    color: #6b7280;
  }

  textarea.form-control {
    resize: none;
  }

  .btn-primary {
    background-color: #3b82f6;
    border: none;
    border-radius: 8px;
    color: #fff;
  }

  .btn-primary:hover {
    background-color: #2563eb;
  }

  label {
    font-weight: 500;
    color: #374151;
  }

  small {
    display: block;
    margin-top: 5px;
    color: #374151;
  }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Edit Product</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="btn btn-outline-light " href="/ad/">Home</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'addpr' %}">Add Products</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'report' %}">Report</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'dashboard' %}">Dashboard</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_order' %}">Orders</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_customer' %}">Customer</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="/">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>


<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 70px);">
  <div class="glass-card">
    <h3>Edit Product</h3>
    <form method="POST" enctype="multipart/form-data" autocomplete="off">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" name="name" class="form-control" value="{{ data.name }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Select Existing Category</label>
        <select name="existing_category" class="form-control">
          <option selected disabled>-- Select Category --</option>
          {% for cat in categories %}
            <option value="{{ cat.name }}" {% if data.Category.name == cat.name %}selected{% endif %}>{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Or Enter New Category</label>
        <input type="text" name="new_category" class="form-control" placeholder="Enter new category">
      </div>

      <div class="mb-3">
        <label class="form-label">Quantity</label>
        <input type="number" name="quantity" class="form-control" value="{{ data.quantity }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" name="price" class="form-control" value="{{ data.price }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3" required>{{ data.discription }}</textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Expiry Date</label>
        <input type="date" name="expdate" class="form-control"  value="{{ data.exp_date|date:'Y-m-d' }}"  required>
      </div>

      <div class="mb-3">
        <label class="form-label">Product Image</label>
        <input type="file" name="image" class="form-control">
        {% if data.image %}
         <small> <img src="{{ data.image.url }}" ></a></small>
  {% endif %}
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary btn-lg">Update Product</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
