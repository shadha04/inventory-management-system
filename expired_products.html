<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expired Products</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
   <style>
  body {
    background: linear-gradient(to right, #dbeafe, #e0f2fe);
    min-height: 100vh;
    padding-top: 70px;
    color: #1f2937;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .navbar {
    background-color: #60a5fa !important;
  }

  /* Common card style */
  .card {
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
    color: #1f2937;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    margin-bottom: 20px;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
  }

  .card-img-top {
    height: 180px;
    object-fit: cover;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
  }

  /* Button styles */
  .btn-edit {
    background-color: #3b82f6; /* soft blue */
    border: none;
    color: #fff;
    margin-right: 5px;
    border-radius: 8px;
    padding: 6px 12px;
    transition: background 0.2s ease;
  }
  .btn-edit:hover { background-color: #2563eb; }

  .btn-delete {
    background-color: #f87171; /* soft red */
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 12px;
    transition: background 0.2s ease;
  }
  .btn-delete:hover { background-color: #ef4444; }

  /* Optional: Card color variations */
  .card-blue { background: linear-gradient(to bottom right, #bfdbfe, #93c5fd); }
  .card-red { background: linear-gradient(to bottom right, #fecaca, #f87171); }
  .card-green { background: linear-gradient(to bottom right, #bbf7d0, #4ade80); }
  .card-yellow { background: linear-gradient(to bottom right, #fef9c3, #fde68a); }

</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Expired</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="btn btn-outline-light " href="/ad/">Home</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'addpr' %}">Add Products</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'report' %}">Report</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'dashboard' %}">Dashboard</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_order' %}">Orders</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_customer' %}">Customer</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="/">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    {% for p in products %}
    <div class="col-md-4">
      <div class="card">
        {% if p.image %}
        <img src="{{ p.image.url }}" class="card-img-top" alt="{{ p.name }}">
        {% endif %}
        <div class="card-body">
          <h5 class="card-title">{{ p.name }}</h5>
          <p>Qty: {{ p.quantity }}</p>
          <p>Exp: {{ p.exp_date }}</p>
          <a href="{% url 'details' p.id %}" class="btn btn-light btn-sm">View</a>
          <a href="{% url 'edit_product' p.id %}" class="btn btn-primary btn-sm">Edit</a>
          <a href="{% url 'del_product' p.id %}" class="btn btn-danger btn-sm" 
             onclick="return confirm('Are you sure?');">Delete</a>
        </div>
      </div>
    </div>
    {% empty %}
    <p class="text-center w-100 mt-4">No expired products found.</p>
    {% endfor %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
