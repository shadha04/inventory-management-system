<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Login Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
    background: linear-gradient(to right, #dbeafe, #e0f2fe);
    color: #1f2937;
    padding-top: 70px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .navbar {
    background-color: #60a5fa !important;
  }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      width: 90%;        /* almost full width */
      max-width: 500px;  /* optional max width */
      margin: auto;
      color: #131313;
    }

    .glass-card h3 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    }

    .form-control {
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: #141414;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .form-control::placeholder {
      color: #1a1919;
    }

    .btn-primary {
      background-color: #1976d2;
      border: none;
      border-radius: 8px;
    }

    .btn-primary:hover {
      background-color: #1565c0;
    }

    a {
      color: #0a0a0a;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: #bbdefb;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Login Page</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="btn btn-outline-light" href="/">Home</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="/reg">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 70px);">
  <div class="glass-card">
    <h2 class="text-center mb-4">Login</h2>
    <form method="POST" autocomplete='off'>
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autocomplete='off' required placeholder="Enter your username">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password"
       name="password"
       class="form-control"
       autocomplete="new-password"
       required
       placeholder="Enter your password">
      </div>

      <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary btn-lg">Login</button>
      </div>

      <div class="mt-3 text-center">
        <a href="/reg">Don't have an account? Register</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
