<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Admin Dashboard - Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
    background: linear-gradient(to right, #dbeafe, #e0f2fe);
    color: #1f2937;
    padding-top: 70px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .navbar {
    background-color: #60a5fa !important;
  }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      margin-bottom: 20px;
      color: #302929;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card-img-top {
      height: 180px;
      object-fit: cover;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }

    .btn-edit {
      background-color: #1976d2;
      border: none;
      color: #161414;
      margin-right: 5px;
    }

    .btn-edit:hover {
      background-color: #1565c0;
    }

    .btn-delete {
      background-color: #d32f2f;
      border: none;
      color: #1b1919;
    }

    .btn-delete:hover {
      background-color: #b71c1c;
    }

    .card-title {
      font-weight: 600;
    }

    .card-text {
      font-size: 0.9rem;
    }

    .container h2 {
      margin-bottom: 30px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Customers</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="btn btn-outline-light" href="/ad/">Home</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'addpr' %}">Add Products</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'report' %}">Report</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'dashboard' %}">Dashboard</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="{% url 'view_order' %}">Orders</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light active" href="{% url 'view_customer' %}">Customer</a></li>
        <li class="nav-item ms-2"><a class="btn btn-outline-light" href="/">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Products -->
<div class="container">
  <h2>All Customers</h2>
  <div class="row">
   {% for cust in data %}
  <div class="card">
    <div class="card-body">
      <h5 class="card-title">{{ cust.Customer_id.username }}</h5>
      <p class="card-text">
        Email: {{ cust.Customer_id.email }}<br>
        Address: {{ cust.address }}<br>
        Phone: {{ cust.ph_no }}<br>
      </p>
    </div>
  </div>
{% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
